{% extends "cms/base.html" %}
{% block title %}Neues Passwort{% endblock %}
{% block content %}
<div class="auth-card">
  <div class="auth-logo">
    <i class="bi bi-shield-lock-fill"></i>
    <h1>Neues Passwort</h1>
  </div>
  <form method="post" class="auth-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
    <div class="mb-3">
      <label for="password" class="form-label">Neues Passwort</label>
      <input type="password" id="password" name="password" class="form-control"
             required minlength="8" placeholder="Mindestens 8 Zeichen">
    </div>
    <div class="mb-3">
      <label for="password2" class="form-label">Passwort bestätigen</label>
      <input type="password" id="password2" name="password2" class="form-control"
             required placeholder="Passwort wiederholen">
    </div>
    <button type="submit" class="btn btn-primary w-100 btn-lg">
      <i class="bi bi-check-lg"></i> Passwort speichern
    </button>
  </form>
</div>
{% endblock %}
