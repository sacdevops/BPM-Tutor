{% extends "cms/base.html" %}
{% block title %}{{ _t('auth.new_password_page_title', 'New Password') }}{% endblock %}
{% block content %}
<div class="auth-card">
  <div class="auth-logo">
    <i class="bi bi-shield-lock-fill"></i>
    <h1>{{ _t('auth.new_password_page_title', 'New Password') }}</h1>
  </div>
  <form method="post" class="auth-form">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
    <div class="mb-3">
      <label for="password" class="form-label">{{ _t('auth.new_password_label', 'New Password') }}</label>
      <input type="password" id="password" name="password" class="form-control"
             required minlength="8" placeholder="{{ _t('auth.password_hint', 'Minimum 8 characters') }}">
    </div>
    <div class="mb-3">
      <label for="password2" class="form-label">{{ _t('auth.password_confirm_label', 'Confirm password') }}</label>
      <input type="password" id="password2" name="password2" class="form-control"
             required placeholder="{{ _t('auth.password_confirm_placeholder', 'Repeat password') }}">
    </div>
    <button type="submit" class="btn btn-primary w-100 btn-lg">
      <i class="bi bi-check-lg"></i> {{ _t('auth.save_password_btn', 'Save password') }}
    </button>
  </form>
</div>
{% endblock %}
