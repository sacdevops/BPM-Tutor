<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ _t('maintenance.title', 'Maintenance') }} — {{ site_name }}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <style>
    body { background: #f8f9fa; }
    .maintenance-box { max-width: 480px; margin: 10vh auto; }
  </style>
</head>
<body>
  <div class="maintenance-box text-center p-5">
    <div class="mb-4" style="font-size:4rem;">🔧</div>
    <h1 class="h3 mb-2">{{ _t('maintenance.title', 'Maintenance') }}</h1>
    <p class="text-muted">{{ _t('maintenance.message', 'The system is currently in maintenance mode. Please try again later.') }}</p>
    <hr>
    <p class="small text-muted mb-0">{{ site_name }}</p>
  </div>
  <script>
    // Automatically redirect to home when maintenance mode is lifted
    (function() {
      function checkMaintenance() {
        fetch('/maintenance', { method: 'HEAD' })
          .then(function(r) {
            // If the server no longer returns 503 (maintenance off), redirect to home
            if (r.status !== 503) { window.location.href = '/'; }
          })
          .catch(function() {});
      }
      // Check every 30 seconds
      setInterval(checkMaintenance, 30000);
    })();
  </script>
</body>
</html>
