services:

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save "" --appendonly no --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── nginx reverse proxy — serves /static/ directly, proxies rest to app ─────────
  nginx:
    image: nginx:1.30-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "5001:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./app/static:/app/static:ro
    healthcheck:
      test: ["CMD-SHELL", "nginx -t 2>/dev/null && echo ok"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Application ──────────────────────────────────────────────────────────────
  app:
    build: .
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    # Port no longer exposed directly — nginx handles all external traffic
    environment:
      FLASK_ENV: production
      # HTTPS is terminated by nginx (or an external load balancer).
      # Set FORCE_HTTPS=true only when the app itself must redirect HTTP→HTTPS.
      FORCE_HTTPS: "false"
      HOME: /tmp

      # Secrets — set via .env file or server environment variables
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set in .env}

      # SQLite database path inside the container (shared volume)
      DATABASE_URL: sqlite:////app/data/bpmtutor.db

      # Redis connection string
      REDIS_URL: redis://redis:6379/0

      # Mail, API endpoint and API keys are managed in the Admin CMS (Settings)
      # and stored in the database — do NOT set them here.

    volumes:
      # Persist SQLite database, uploads and task stats across container restarts
      - app_data:/app/data
      # Bind-mount source code so that a `git pull` + `docker compose up -d`
      # (without --build) picks up code changes immediately.
      # Only requirements.txt changes still require a rebuild.
      - ./app:/app/app:ro
      - ./deploy:/app/deploy:ro
      - ./lib:/app/lib:ro
      - ./config.py:/app/config.py:ro

    healthcheck:
      # Use curl so we get a proper exit code without Python import overhead.
      # --fail makes curl exit non-zero on HTTP 4xx/5xx.
      # --silent / --show-error suppress progress but print errors.
      test: ["CMD-SHELL", "python -c \"import urllib.request, sys; r=urllib.request.urlopen('http://localhost:5001/health'); sys.exit(0 if r.status==200 else 1)\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ── Celery worker — processes async LLM calls ─────────────────────────────
  worker:
    build: .
    restart: unless-stopped
    environment:
      ROLE: worker
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set in .env}
      DATABASE_URL: sqlite:////app/data/bpmtutor.db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - app_data:/app/data
      - ./app:/app/app:ro
      - ./deploy:/app/deploy:ro
      - ./lib:/app/lib:ro
      - ./config.py:/app/config.py:ro

  # ── Celery Beat scheduler — fires periodic tasks (backups, notifications) ─────
  beat:
    build: .
    restart: unless-stopped
    environment:
      ROLE: beat
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set in .env}
      DATABASE_URL: sqlite:////app/data/bpmtutor.db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      # beat stores its schedule state file here so it survives restarts
      - app_data:/app/data
      - ./app:/app/app:ro
      - ./deploy:/app/deploy:ro
      - ./lib:/app/lib:ro
      - ./config.py:/app/config.py:ro

volumes:
  redis_data:
    driver: local
  app_data:
    driver: local
  app_data:
    driver: local
