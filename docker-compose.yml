version: "3.9"

services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      # Flask core — override in production!
      FLASK_ENV: production
      SECRET_KEY: ${SECRET_KEY:-change_this_in_production}

      # Mail (optional — set in .env or environment)
      MAIL_SERVER: ${MAIL_SERVER:-localhost}
      MAIL_PORT: ${MAIL_PORT:-587}
      MAIL_USE_TLS: ${MAIL_USE_TLS:-true}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      MAIL_DEFAULT_SENDER: ${MAIL_DEFAULT_SENDER:-noreply@bpmtutor.local}

      # CampusKI / OpenAI-compatible API
      OPENAI_API_BASE: ${OPENAI_API_BASE:-https://chat.kiconnect.nrw/api}
      GLOBAL_API_KEY: ${GLOBAL_API_KEY:-}

    volumes:
      # Persist database and uploads outside the container
      - bpmtutor_data:/app/data

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  bpmtutor_data:
    driver: local
