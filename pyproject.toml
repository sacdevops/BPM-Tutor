[tool.ruff]
line-length = 100
target-version = "py311"
select = ["E", "F", "W", "I", "N", "UP", "B", "C4", "SIM"]
ignore = [
    "E501",   # Line length — handled by formatter
    "B008",   # Do not perform function calls in argument defaults (Flask patterns)
    "UP007",  # Use X | Y for union types — requires Python 3.10+
    "N818",   # Exception name ... should be named with an Error suffix
]

[tool.ruff.isort]
known-first-party = ["app", "config", "lib"]

[tool.ruff.per-file-ignores]
"app/models/*.py" = ["N805"]         # first argument of method should be self
"app/blueprints/**/__init__.py" = ["F401"]  # unused imports are re-exports

[tool.black]
line-length = 100
target-version = ["py311"]
skip-string-normalization = false

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
