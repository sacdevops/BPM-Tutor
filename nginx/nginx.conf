# BPM-Tutor nginx reverse proxy
#
# Responsibilities:
#   1. Serve /static/ directly from the filesystem — gunicorn is bypassed
#      entirely for static assets (CSS, JS, images).
#   2. Proxy /socket.io/ with WebSocket upgrade support (Flask-SocketIO).
#   3. Proxy all other requests to gunicorn with correct forwarding headers.
#
# Timeouts match gunicorn's --timeout 300 to avoid premature disconnects
# during long LLM streaming responses.

upstream bpmtutor_app {
    server app:5001;
    keepalive 32;          # reuse connections to gunicorn
}

server {
    listen 80;
    server_name _;

    # Default limit covers regular form/file uploads.
    # The DB-import endpoint is admin-only and may receive files up to ~500 MB;
    # Flask relaxes its own limit for that route via a before_request hook.
    client_max_body_size 512M;

    # ── Static files ─────────────────────────────────────────────────────────
    # Served directly by nginx; gunicorn never sees these requests.
    # The bind-mount in docker-compose points this alias to ./app/static/.
    location /static/ {
        alias /app/static/;
        expires 10m;
        add_header Cache-Control "public, max-age=600, must-revalidate";
        etag on;
        access_log off;
        gzip_static on;
    }

    # ── Flask-SocketIO (WebSocket + long-poll) ───────────────────────────────
    # Must handle both the initial HTTP upgrade and the ongoing WS frames.
    # proxy_buffering off is required — buffering breaks WebSocket/SSE.
    location /socket.io/ {
        proxy_pass         http://bpmtutor_app;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "Upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout  3600s;   # keep WebSocket alive for the full session
        proxy_send_timeout  3600s;
        proxy_buffering     off;
    }

    # ── All other HTTP requests ───────────────────────────────────────────────
    location / {
        proxy_pass         http://bpmtutor_app;
        proxy_http_version 1.1;
        proxy_set_header   Connection "";          # HTTP/1.1 keep-alive
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout  300s;    # match gunicorn --timeout 300
        proxy_send_timeout  300s;
        proxy_buffer_size   8k;
        proxy_buffers       16 8k;
    }
}
